<!DOCTYPE html>
<html lang="br-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classes em CSS</title>
    <style>
        .diferente {
            /*classes são caracterizadas pelo ponto */
            color: blue;
            background-color: rgb(203, 142, 253);
        }
        .anormal {
            color: red;
            background-color: rgb(0, 0, 0);
        }
        .anormal.sans-serif {
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <p class="diferente">primeiro diferente</p>
    <p class="anormal">primeiro anormal</p>
    <p class="anormal.sans-serif">primeiro anormal fonte sans-serif</p>
    <h1 class="diferente">titulo n1</h1>>
</body>
</html>
