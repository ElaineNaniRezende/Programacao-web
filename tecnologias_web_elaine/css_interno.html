<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>castading style sheet</title>
    <style>
        /*primeiro: Iniciando o css Interno, caracterizado pelo uso da teg style */
        p {
            background-color: rgb(112, 112, 112);/*define a cor de fundo*/
            color: rgb(255, 255, 255);/*define a cor das letras */
            font-size: 16pt;/*define tamanho da fonte */
            font-family: sans-serif;/*define a fonte */
        }
        body {
            background-color: rgb(253, 253, 253);
        }
        h1 {
            color: brown;
        }
    </style>
</head>
<body>
    <p>primeiro</p>
    <p>segundo</p>
    <h1>Cabeçario</h1>
</body>
</html>
